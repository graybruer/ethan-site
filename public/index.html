    <!-- This is code from stackoverflow that suspends all css rtansition properties while the window is being resized so that there isn't an annoying delay -->
    <!-- see: https://stackoverflow.com/questions/38526764/disable-css-transitions-on-window-resize -->
    <script>
      (function() {
          const classes = document.body.classList;
          let timer = 0;
          window.addEventListener('resize', function () {
              if (timer) {
                  clearTimeout(timer);
                  timer = null;
              }
              else
                  classes.add('stop-transitions');

              timer = setTimeout(() => {
                  classes.remove('stop-transitions');
                  timer = null;
              }, 100);
          });
      })();
    </script>

  </body>
